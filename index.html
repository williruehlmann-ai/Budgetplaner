  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ody { margin: 0; padding: 0; }\n  body {\n    font-family: 'Inter', system-ui, -apple-system, sans-serif;\n    background: var(--bg);\n    color: var(--ink);\n    font-size: 14px;\n    line-height: 1.45;\n    -webkit-font-smoothing: antialiased;\n    min-height: 100vh;\n  }\n\n  /* Header */\n  .topbar {\n    background: var(--brand-900);\n    color: white;\n    padding: 18px 40px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    border-bottom: 3px solid var(--accent);\n  }\n  .brand {\n    display: flex; align-items: center; gap: 14px;\n    font-family: 'Manrope', sans-serif;\n  }\n\n  .header-fields {\n    display: flex; flex-direction: column; gap: 6px;\n    margin-left: 20px; padding-left: 20px;\n    border-left: 1px solid rgba(255,255,255,0.18);\n  }\n  .hf-row {\n    display: flex; align-items: center; gap: 10px;\n    font-family: 'Inter', sans-serif;\n  }\n  .hf-row label {\n    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;\n    color: #9BB3DB; font-weight: 600;\n    width: 90px;\n  }\n  .hf-row input {\n    background: rgba(255,255,255,0.08);\n    border: 1px solid rgba(255,255,255,0.18);\n    border-radius: 6px;\n    padding: 5px 10px;\n    color: white;\n    font-family: 'Inter', sans-serif;\n    font-size: 12px;\n    min-width: 260px;\n    transition: all 0.15s ease;\n  }\n  .hf-row input::placeholder { color: #6B86B0; }\n  .hf-row input:focus {\n    outline: none;\n    background: rgba(255,255,255,0.14);\n    border-color: var(--accent);\n  }\n  .logo-mark {\n    width: 36px; height: 36px; border-radius: 8px;\n    background: linear-gradient(135deg, var(--brand-500) 0%, var(--brand-400) 100%);\n    display: grid; place-items: center;\n    font-weight: 800; color: white; letter-spacing: -0.5px;\n    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15);\n  }\n  .brand-title {\n    font-weight: 800; font-size: 18px; letter-spacing: -0.01em;\n  }\n  .brand-sub {\n    font-size: 11px; color: #9BB3DB; letter-spacing: 0.12em;\n    text-transform: uppercase; margin-top: 2px;\n  }\n  .topbar-right {\n    display: flex; align-items: center; gap: 18px;\n    font-size: 12px; color: #9BB3DB;\n  }\n\n  /* Tabs */\n  .tabs {\n    display: flex; gap: 0;\n    background: white;\n    border-bottom: 1px solid var(--line);\n    padding: 0 40px;\n  }\n  .tab {\n    padding: 14px 22px;\n    font-family: 'Inter', sans-serif;\n    font-size: 13px; font-weight: 600;\n    color: var(--ink-3);\n    cursor: pointer;\n    border: none; background: transparent;\n    border-bottom: 2px solid transparent;\n    transition: color 0.15s ease, border-color 0.15s ease;\n    display: flex; align-items: center; gap: 8px;\n    letter-spacing: 0.01em;\n  }\n  .tab:hover { color: var(--brand-700); }\n  .tab.active { color: var(--brand-700); border-bottom-color: var(--accent); }\n  .tab svg { width: 16px; height: 16px; }\n\n  .view { display: none; }\n  .view.active { display: block; }\n\n  /* Wealth view */\n  .wealth-wrap {\n    padding: 28px 40px 48px;\n    max-width: 1200px;\n  }\n  .wealth-grid {\n    display: grid;\n    grid-template-columns: 420px 1fr;\n    gap: 24px;\n  }\n  .wealth-card {\n    background: white;\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    padding: 24px;\n  }\n  .wealth-section + .wealth-section { margin-top: 24px; }\n\n  .asset-row {\n    display: grid;\n    grid-template-columns: 1fr 150px;\n    align-items: center;\n    gap: 12px;\n    padding: 12px 0;\n    border-bottom: 1px solid var(--line);\n  }\n  .asset-row:last-child { border-bottom: none; }\n  .asset-row .row-label { font-size: 13px; font-weight: 500; color: var(--ink-2); display: flex; align-items: center; gap: 10px; }\n\n  .wealth-summary {\n    background: var(--brand-900);\n    color: white;\n    border-radius: 12px;\n    padding: 28px 32px;\n    display: grid;\n    grid-template-columns: 1.4fr 1fr 1fr;\n    gap: 28px;\n    align-items: end;\n    margin-bottom: 24px;\n  }\n  .wealth-summary .ws  font-size: 11px; color: var(--ink-3); margin-top: 4px; }\n  .topbar-right .pill {\n    padding: 6px 12px; border-radius: 999px;\n    border: 1px solid rgba(255,255,255,0.18);\n    color: #CFDBF0;\n  }\n  .topbar-right .pill b { color: white; font-weight: 600; }\n\n  .save-btn {\n    display: flex; align-items: center; gap: 7px;\n    padding: 8px 14px; border-radius: 999px;\n    background: var(--accent); color: white;\n    border: none;\n    font-family: 'Inter', sans-serif;\n    font-size: 12px; font-weight: 700;\n    letter-spacing: 0.02em;\n    cursor: pointer;\n    transition: all 0.15s ease;\n    box-shadow: 0 1px 0 rgba(0,0,0,0.15) inset, 0 2px 6px rgba(255,122,26,0.35);\n  }\n  .save-btn:hover { background: #e86a08; transform: translateY(-1px); }\n  .save-btn:active { transform: translateY(0); }\n\n  /* Layout */\n  .layout {\n    display: grid;\n    grid-template-columns: 420px 1fr;\n    gap: 0;\n    min-height: calc(100vh - 76px);\n  }\n  .sidebar {\n    background: white;\n    border-right: 1px solid var(--line);\n    padding: 28px 28px 40px;\n    overflow-y: auto;\n  }\n  .main {\n    padding: 28px 40px 48px;\n  }\n\n  /* Sidebar sections */\n  .section-label {\n    font-size: 10px;\n    font-weight: 700;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--ink-3);\n    margin: 4px 0 14px;\n    display: flex; align-items: center; gap: 10px;\n  }\n  .section-label::after {\n    content: \"\"; flex: 1; height: 1px; background: var(--line);\n  }\n  .section-label.income::before { background: var(--brand-500); }\n  .section-label.expenses::before { background: var(--accent); }\n  .section-label::before {\n    content: \"\"; width: 6px; height: 6px; border-radius: 50%;\n    background: var(--brand-500);\n  }\n\n  /* Input rows */\n  .row {\n    display: grid;\n    grid-template-columns: 1fr 130px;\n    align-items: center;\n    gap: 12px;\n    padding: 10px 0;\n    border-bottom: 1px solid var(--line);\n  }\n  .row:last-child { border-bottom: none; }\n  .row-label {\n    display: flex; align-items: center; gap: 10px;\n    font-size: 13px; font-weight: 500; color: var(--ink-2);\n  }\n  .row-icon {\n    width: 28px; height: 28px; border-radius: 7px;\n    background: var(--brand-50);\n    display: grid; place-items: center;\n    color: var(--brand-600);\n  }\n  .row-icon svg { width: 16px; height: 16px; }\n  .row.expense .row-icon { background: #FFF1E5; color: var(--accent); }\n  .row.savings .row-icon { background: #E6F4EE; color: var(--ok); }\n\n  .input-wrap {\n    position: relative;\n    display: flex; align-items: center;\n  }\n  .input-wrap .eur {\n    position: absolute; right: 12px;\n    font-size: 12px; color: var(--ink-3); font-weight: 500;\n    pointer-events: none;\n  }\n  input.money {\n    width: 100%;\n    padding: 9px 28px 9px 12px;\n    border: 1px solid var(--line-2);\n    border-radius: 8px;\n    background: var(--brand-50);\n    font-family: 'Inter', sans-serif;\n    font-size: 14px;\n    font-weight: 600;\n    color: var(--ink);\n    text-align: right;\n    transition: all 0.15s ease;\n    -moz-appearance: textfield;\n  }\n  input.money::-webkit-outer-spin-button,\n  input.money::-webkit-inner-spin-button {\n    -webkit-appearance: none; margin: 0;\n  }\n  input.money:focus {\n    outline: none;\n    border-color: var(--brand-500);\n    background: white;\n    box-shadow: 0 0 0 3px rgba(44,107,209,0.15);\n  }\n  input.money::placeholder { color: var(--ink-3); font-weight: 400; }\n\n  .sidebar-totals {\n    margin-top: 24px;\n    padding: 16px;\n    border-radius: 10px;\n    background: var(--brand-900);\n    color: white;\n  }\n  .total-row {\n    display: flex; justify-content: space-between;\n    padding: 6px 0; font-size: 13px;\n  }\n  .total-row .lbl { color: #9BB3DB; }\n  .total-row .val { font-weight: 600; font-family: 'Manrope', sans-serif; }\n  .total-row.divider { border-top: 1px dashed rgba(255,255,255,0.18); margin-top: 6px; padding-top: 12px; }\n  .total-row.result .val { font-size: 20px; }\n  .total-row.result .val.pos { color: #6EE7B7; }\n  .total-row.result .val.neg { color: #FFB68A; }\n\n  .reset-btn {\n    margin-top: 14px; width: 100%;\n    padding: 10px; border-radius: 8px;\n    border: 1px solid var(--line-2);\n    background: white; color: var(--ink-2);\n    font-family: 'Inter', sans-serif;\n    font-size: 12px; font-weight: 600; cursor: pointer;\n    letter-spacing: 0.02em;\n    transition: all 0.15s ease;\n  }\n  .reset-btn:hover { background: var(--brand-50); color: var(--brand-700); border-color: var(--brand-400); }\n\n  /* Main */\n  .main-header {\n    display: flex; justify-content: space-between; align-items: flex-end;\n    margin-bottom: 24px;\n  }\n  .main-title {\n    font-family: 'Manrope', sans-serif;\n    font-size: 24px; font-weight: 800;\n    letter-spacing: -0.02em; color: var(--ink);\n    margin: 0;\n  }\n  .main-sub {\n    color: var(--ink-3); font-size: 13px; margin-top: 4px;\n  }\n\n  .example-btn {\n    padding: 8px 14px; border-radius: 8px;\n    border: 1px solid var(--brand-500);\n    background: white; color: var(--brand-600);\n    font-family: 'Inter', sans-serif;\n    font-size: 12px; font-weight: 600; cursor: pointer;\n    transition: all 0.15s ease;\n  }\n  .example-btn:hover { background: var(--brand-500); color: white; }\n\n  /* KPI cards */\n  .kpi-grid {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 16px;\n    margin-bottom: 24px;\n  }\n  .kpi {\n    background: white;\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    padding: 18px 18px 16px;\n    display: flex; flex-direction: column; justify-content: space-between;\n    min-height: 128px;\n    position: relative;\n  }\n  .kpi-head {\n    display: flex; justify-content: space-between; align-items: flex-start;\n  }\n  .kpi-label {\n    font-size: 11px; font-weight: 600;\n    color: var(--ink-3);\n    letter-spacing: 0.08em; text-transform: uppercase;\n  }\n  .kpi-value {\n    font-family: 'Manrope', sans-serif;\n    font-size: 28px; font-weight: 800;\n    letter-spacing: -0.02em; color: var(--ink);\n    margin-top: 12px;\n  }\n  .kpi-value .unit { font-size: 16px; color: var(--ink-3); margin-left: 2px; font-weight: 600; }\n  .kpi-foot {\n    font-size: 11px; color: var(--ink-3); margin-top: 6px;\n  }\n  .kpi-foot b { color: var(--ink-2); font-weight: 600; }\n  .kpi .badge {\n    font-size: 9px; font-weight: 700; letter-spacing: 0.05em;\n    padding: 3px 7px; border-radius: 4px; text-transform: uppercase;\n    position: absolute;\n    top: 16px; right: 16px;\n    white-space: nowrap;\n  }\n  .badge.ok { background: #E6F4EE; color: var(--ok); }\n  .badge.warn { background: var(--accent-soft); color: var(--warn); }\n  .badge.neu { background: var(--brand-100); color: var(--brand-700); }\n\n  /* Chart cards */\n  .chart-grid {\n    display: grid;\n    grid-template-columns: 1.1fr 1fr;\n    gap: 16px;\n    margin-bottom: 16px;\n  }\n  .card {\n    background: white;\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    padding: 22px 24px;\n  }\n  .card-head {\n    display: flex; justify-content: space-between; align-items: baseline;\n    margin-bottom: 14px;\n  }\n  .card-title {\n    font-family: 'Manrope', sans-serif;\n    font-size: 15px; font-weight: 700;\n    letter-spacing: -0.01em;\n  }\n  .card-sub {\n    font-size: 11px; color: var(--ink-3);\n    letter-spacing: 0.04em;\n  }\n\n  /* Donut */\n  .donut-wrap {\n    display: grid;\n    grid-template-columns: 260px 1fr;\n    gap: 24px; align-items: center;\n  }\n  .donut-center {\n    position: relative;\n    width: 220px; height: 220px;\n  }\n  .donut-center .c-label {\n    position: absolute; inset: 0;\n    display: flex; flex-direction: column;\n    align-items: center; justify-content: center;\n    text-align: center; pointer-events: none;\n  }\n  .c-label .c-top { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }\n  .c-labe >\n          <div class=\"section-label expenses\">Verbindlichkeiten<\u002Fdiv>\n          <div id=\"debt-list\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- RIGHT: Charts -->\n      <div>\n        <div class=\"wealth-card\" style=\"margin-bottom: 16px;\">\n          <div class=\"card-head\">\n            <div>\n              <div class=\"card-title\">Vermögens-Allokation<\u002Fdiv>\n              <div class=\"card-sub\">Aufteilung deines Brutto-Vermögens<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div id=\"alloc-bars\" style=\"margin-top: 8px;\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"wealth-card\">\n          <div class=\"card-head\">\n            <div>\n              <div class=\"card-title\">Depot-Hochrechnung<\u002Fdiv>\n              <div class=\"card-sub\">Aktueller Depot-Wert + monatliche Sparrate · 6% Rendite p.a.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"projection-grid\">\n            <div class=\"proj-card\"><div class=\"p-lbl\">In 5 Jahren<\u002Fdiv><div class=\"p-val\" id=\"proj-5\">0 €<\u002Fdiv><div class=\"p-sub\">bei 6% p.a.<\u002Fdiv><\u002Fdiv>\n            <div class=\"proj-card\"><div class=\"p-lbl\">In 10 Jahren<\u002Fdiv><div class=\"p-val\" id=\"proj-10\">0 €<\u002Fdiv><div class=\"p-sub\">bei 6% p.a.<\u002Fdiv><\u002Fdiv>\n            <div class=\"proj-card\"><div class=\"p-lbl\">In 20 Jahren<\u002Fdiv><div class=\"p-val\" id=\"proj-20\">0 €<\u002Fdiv><div class=\"p-sub\">bei 6% p.a.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"p-sub\" id=\"proj-note\" style=\"margin-top:14px; font-size:11px;\">Sparrate aus dem Budgetplan wird automatisch berücksichtigt.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><!-- /view-wealth -->\n\n<div id=\"view-notes\" class=\"view\">\n  <div class=\"wealth-wrap\" style=\"max-width: 900px;\">\n    <div class=\"main-header\" style=\"margin-bottom: 20px;\">\n      <div>\n        <h1 class=\"main-title\">Notizen<\u002Fh1>\n        <div class=\"main-sub\">Beratungsgespräch, Ziele, Besonderheiten – wird mit ins PDF übernommen.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"wealth-card\">\n      <div class=\"card-head\" style=\"margin-bottom: 14px;\">\n        <div>\n          <div class=\"card-title\">Persönliche Notizen<\u002Fdiv>\n          <div class=\"card-sub\">Freitext · z.B. Beratungsdatum, Wünsche, Ziele, offene Fragen<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <textarea id=\"client-notes\" placeholder=\"Hier Notizen zum Kunden, zur Beratung oder zu konkreten Zielen eintragen …\" style=\"width: 100%; min-height: 360px; padding: 16px; border: 1px solid var(--line-2); border-radius: 8px; background: var(--brand-50); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.55; color: var(--ink); resize: vertical; outline: none;\" onfocus=\"this.style.background='white'; this.style.borderColor='var(--brand-500)'; this.style.boxShadow='0 0 0 3px rgba(44,107,209,0.15)';\" onblur=\"this.style.background='var(--brand-50)'; this.style.borderColor='var(--line-2)'; this.style.boxShadow='none';\"><\u002Ftextarea>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><!-- /view-notes -->\n\n<script>\n/* =================== DATA =================== */\n\nconst INCOME_FIELDS = [\n  { id: 'salary', label: 'Nettogehalt', icon: 'wallet', placeholder: '2.500' },\n  { id: 'side',   label: 'Nebenjob / Freelance', icon: 'briefcase', placeholder: '0' },\n  { id: 'misc',   label: 'Sonstige Einnahmen', icon: 'plus', placeholder: '0' },\n];\n\n// type: \"fix\" = Fixkosten, \"var\" = variable Ausgaben, \"save\" = Sparen\nconst EXPENSE_FIELDS = [\n  { id: 'housing',   label: 'Wohnen (Miete kalt)',           icon: 'home',      type: 'fix',  color: '#0A1F44' },\n  { id: 'utilities', label: 'Strom, Wasser, Gas',            icon: 'bolt',      type: 'fix',  color: '#183A7E' },\n  { id: 'food',      label: 'Lebensmittel & Haushalt',       icon: 'cart',      type: 'var',  color: '#1F4FA5' },\n  { id: 'fuel',      label: 'Tanken & Auto',                 icon: 'fuel',      type: 'var',  color: '#2C6BD1' },\n  { id: 'transit',   label: 'ÖPNV & Bahn',                   icon: 'train',     type: 'var',  color: '#4A7CCD' },\n  { id: 'mobile',    label: 'Handy & Internet',              icon: 'phone',     type: 'fix',  color: '#5C8FDE' },\n  { id: 'insurance', label: 'Versicherungen',                icon: 'shield',    type: 'fix',  color: '#7AA5E3' },\n  { id: 'loans',     label: 'Kredite & Raten',               icon: 'bank',      type: 'fix',  color: '#C24A12' },\n  { id: 'subs',      label: 'Abos & Streaming',              icon: 'play',      type: 'fix',  color: '#8EB3E8' },\n  { id: 'gym',       label: 'Fitnessstudio',                 icon: 'dumbbell',  type: 'fix',  color: '#A6C2E8' },\n  { id: 'pets',      label: 'Haustiere',                     icon: 'paw',       type: 'var',  color: '#6B8BB8' },\n  { id: 'leisure',   label: 'Freizeit & Ausgehen',           icon: 'sparkle',   type: 'var',  color: '#B8D0EC' },\n  { id: 'savings',   label: 'Sparen & Investieren',          icon: 'piggy',     type: 'save', color: '#FF7A1A' },\n];\n\nconst ICONS = {\n  wallet:   '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 7H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2z\"/><path d=\"M16 12h2\"/><path d=\"M5 7V5a2 2 0 0 1 2-2h10\"/><\u002Fsvg>',\n  briefcase:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"7\" width=\"18\" height=\"13\" rx=\"2\"/><path d=\"M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2\"/><\u002Fsvg>',\n  plus:     '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14\"/><path d=\"M5 12h14\"/><\u002Fsvg>',\n  home:     '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 11l9-8 9 8\"/><path d=\"M5 10v10h14V10\"/><\u002Fsvg>',\n  cart:     '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"9\" cy=\"20\" r=\"1.5\"/><circle cx=\"17\" cy=\"20\" r=\"1.5\"/><path d=\"M3 4h2l2.5 11h11l2-8H6\"/><\u002Fsvg>',\n  car:      '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 14l2-6h10l2 6\"/><rect x=\"3\" y=\"14\" width=\"18\" height=\"5\" rx=\"1\"/><circle cx=\"7\" cy=\"19\" r=\"1\"/><circle cx=\"17\" cy=\"19\" r=\"1\"/><\u002Fsvg>',\n  sparkle:  '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l2 5 5 2-5 2-2 5-2-5-5-2 5-2z\"/><\u002Fsvg>',\n  play:     '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"/><path d=\"M10 9l5 3-5 3z\" fill=\"currentColor\"/><\u002Fsvg>',\n  shield:   '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z\"/><\u002Fsvg>',\n  piggy:    '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 11c0-3.3 3.1-6 7-6s7 2.7 7 6v2l2 1v3h-2.3c-.5 1.2-1.4 2.2-2.7 3v2h-3v-1.5c-.3 0-.7 0-1 0S11.3 20.5 11 20.5V22H8v-2c-1.9-1.1-3-2.9-3-5z\"/><circle cx=\"15\" cy=\"11\" r=\"0.8\" fill=\"currentColor\"/><\u002Fsvg>',\n  bolt:     '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M13 3L5 14h6l-1 7 8-11h-6z\"/><\u002Fsvg>',\n  fuel:     '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"3\" width=\"10\" height=\"18\" rx=\"1\"/><path d=\"M4 10h10\"/><path d=\"M14 8l3 3v7a2 2 0 0 0 4 0V8l-3-3\"/><\u002Fsvg>',\n  train:    '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"3\" width=\"14\" height=\"14\" rx=\"2\"/><path d=\"M5 10h14\"/><circle cx=\"9\" cy=\"14\" r=\"0.8\" fill=\"currentColor\"/><circle cx=\"15\" cy=\"14\" r=\"0.8\" fill=\"currentColor\"/><path d=\"M7 20l-2 2\"/><path d=\"M17 20l2 2\"/><\u002Fsvg>',\n  phone:    '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"7\" y=\"2\" width=\"10\" height=\"20\" rx=\"2\"/><path d=\"M11 18h2\"/><\u002Fsvg>',\n  bank:     '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 10l9-6 9 6\"/><path d=\"M5 10v8\"/><path d=\"M12 10v8\"/><path d=\"M19 10v8\"/><path d=\"M3 20h18\"/><\u002Fsvg>',\n  dumbbell: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 9v6\"/><path d=\"M6 6v12\"/><path d=\"M9 9v6\"/><path d=\"M15 9v6\"/><path d=\"M18 6v12\"/><path d=\"M21 9v6\"/><path d=\"M9 12h6\"/><\u002Fsvg>',\n  paw:      '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"6\" cy=\"10\" r=\"2\"/><circle cx=\"10\" cy=\"6\" r=\"2\"/><circle cx=\"14\" cy=\"6\" r=\"2\"/><circle cx=\"18\" cy=\"10\" r=\"2\"/><path d=\"M8 16c0-2.5 2-4 4-4s4 1.5 4 4c0 2-1.5 3-2.5 3h-3c-1 0-2.5-1-2.5-3z\"/><\u002Fsvg>',\n};\n\n/* =================== BUILD FORM =================== */\n\nfunction buildForm() {\n  const incWrap = document.getElementById('income-list');\n  incWrap.innerHTML = INCOME_FIELDS.map(f => `\n    <div class=\"row income\">\n      <label class=\"row-label\" for=\"in-${f.id}\">\n        <span class=\"row-icon\">${ICONS[f.icon] || ''}<\u002Fspan>\n        ${f.label}\n      <\u002Flabel>\n      <div class=\"input-wrap\">\n        <input type=\"number\" inputmode=\"decimal\" class=\"money\" id=\"in-${f.id}\" data-kind=\"income\" data-id=\"${f.id}\" placeholder=\"${f.placeholder}\" min=\"0\" step=\"1\"/>\n        <span class=\"eur\">€<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n\n  const expWrap = document.getElementById('expense-list');\n  expWrap.innerHTML = EXPENSE_FIELDS.map(f => `\n    <div class=\"row ${f.type === 'save' ? 'savings' : 'expense'}\">\n      <label class=\"row-label\" for=\"ex-${f.id}\">\n        <span class=\"row-icon\" style=\"color:${f.color}; background:${f.type==='save' ? '#E6F4EE' : (f.type==='fix' ? 'var(--brand-100)' : '#FFF1E5')};\">${ICONS[f.icon] || ''}<\u002Fspan>\n        ${f.label}\n      <\u002Flabel>\n      <div class=\"input-wrap\">\n        <input type=\"number\" inputmode=\"decimal\" class=\"money\" id=\"ex-${f.id}\" data-kind=\"expense\" data-id=\"${f.id}\" placeholder=\"0\" min=\"0\" step=\"1\"/>\n        <span class=\"eur\">€<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n}\n\n/* =================== FORMAT =================== */\nconst fmt = (n) => new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(Math.round(n || 0));\nconst fmtShort = (n) => new Intl.NumberFormat('de-DE', { maximumFractionDigits: 0 }).format(Math.round(n || 0));\nconst pct = (n) => (isFinite(n) ? Math.round(n) : 0);\n\n/* =================== READ INPUTS =================== */\n\nfunction readValues() {\n  const income = {};\n  let incomeTotal = 0;\n  INCOME_FIELDS.forEach(f => {\n    const v = parseFloat(document.getElementById('in-' + f.id).value) || 0;\n    income[f.id] = v;\n    incomeTotal += v;\n  });\n\n  const expenses = {};\n  let expenseTotal = 0;\n  let fixTotal = 0;\n  let varTotal = 0;\n  let saveTotal = 0;\n  EXPENSE_FIELDS.forEach(f => {\n    const v = parseFloat(document.getElementById('ex-' + f.id).value) || 0;\n    expenses[f.id] = v;\n    expenseTotal += v;\n    if (f.type === 'fix') fixTotal += v;\n    else if (f.type === 'var') varTotal += v;\n    else if (f.type === 'save') saveTotal += v;\n  });\n\n  return { income, incomeTotal, expenses, expenseTotal, fixTotal, varTotal, saveTotal };\n}\n\n/* =================== RENDER TOTALS + KPIS =================== */\n\nfunction renderTotals(d) {\n  const result = d.incomeTotal - d.expenseTotal;\n  document.getElementById('t-income').textContent  = fmt(d.incomeTotal);\n  document.getElementById('t-expense').textContent = fmt(d.expenseTotal);\n  const resEl = document.getElementById('t-result');\n  resEl.textContent = (result >= 0 ? '+ ' : '− ') + fmt(Math.abs(result)).replace('€','€').replace('-','');\n  resEl.classList.toggle('pos', result >= 0);\n  resEl.classList.toggle('neg', result < 0);\n\n  // KPIs\n  document.getElementById('kpi-income').innerHTML = `${fmtShort(d.incomeTotal)}<span class=\"unit\">€<\u002Fspan>`;\n  document.getElementById('kpi-income-foot').innerHTML = `Jahr: <b>${fmt(d.incomeTotal * 12)}<\u002Fb>`;\n\n  document.getElementById('kpi-expense').innerHTML = `${fmtShort(d.expenseTotal)}<span class=\"unit\">€<\u002Fspan>`;\n  document.getElementById('kpi-expense-foot').innerHTML = `davon Fixkosten: <b>${fmt(d.fixTotal)}<\u002Fb>`;\n\n  const savePct = d.incomeTotal > 0 ? (d.saveTotal / d.incomeTotal) * 100 : 0;\n  document.getElementById('kpi-save').innerHTML = `${pct(savePct)}<span class=\"unit\">%<\u002Fspan>`;\n  document.getElementById('kpi-save-foot').innerHTML = `gespart: <b>${fmt(d.saveTotal)}<\u002Fb>`;\n  const saveBadge = document.getElementById('kpi-save-badge');\n  if (savePct >= 15) { saveBadge.className = 'badge ok'; saveBadge.textContent = 'ZIEL ERREICHT'; }\n  else if (savePct >= 10) { saveBadge.className = 'badge neu'; saveBadge.textContent = `${Math.round(15 - savePct)}% FEHLEN`; }\n  else { saveBadge.className = 'badge warn'; saveBadge.textContent = 'UNTER ZIEL'; }\n\n  const fixPct = d.incomeTotal > 0 ? (d.fixTotal / d.incomeTotal) * 100 : 0;\n  document.getElementById('kpi-fix').innerHTML = `${pct(fixPct)}<span class=\"unit\">%<\u002Fspan>`;\n  const fixBadge = document.getElementById('kpi-fix-badge');\n  if (d.incomeTotal === 0) { fixBadge.className = 'badge neu'; fixBadge.textContent = 'RICHTWERT <50%'; }\n  else if (fixPct < 50) { fixBadge.className = 'badge ok'; fixBadge.textContent = 'GESUND'; }\n  else if (fixPct < 70) { fixBadge.className = 'badge neu'; fixBadge.textContent = 'GRENZWERTIG'; }\n  else { fixBadge.className = 'badge warn'; fixBadge.textContent = 'KRITISCH'; }\n\n  return { savePct, fixPct };\n}\n\n/* =================== DONUT =================== */\n\nfunction renderDonut(d) {\n  const svg = document.getElementById('donut');\n  const total = d.expenseTotal;\n  document.getElementById('donut-total').textContent = fmt(total);\n\n  svg.innerHTML = '';\n  if (total <= 0) {\n    svg.innerHTML = `<circle cx=\"60\" cy=\"60\" r=\"42\" fill=\"none\" stroke=\"#E8F0FB\" stroke-width=\"16\"/>`;\n    document.getElementById('legend').innerHTML = `<div class=\"empty\" style=\"padding:20px 0;\">Noch keine Ausgaben eingetragen.<\u002Fdiv>`;\n    return;\n  }\n\n  const cx = 60, cy = 60, r = 42;\n  const C = 2 * Math.PI * r;\n  let offset = 0;\n  const segments = [];\n  EXPENSE_FIELDS.forEach(f => {\n    const v = d.expenses[f.id];\n    if (v <= 0) return;\n    const share = v / total;\n    const len = share * C;\n    segments.push({ f, v, share, len, offset });\n    offset += len;\n  });\n\n  // background ring\n  svg.insertAdjacentHTML('beforeend',\n    `<circle cx=\"${cx}\" cy=\"${cy}\" r=\"${r}\" fill=\"none\" stroke=\"#E8F0FB\" stroke-width=\"16\"/>`);\n\n  segments.forEach(s => {\n    svg.insertAdjacentHTML('beforeend',\n      `<circle cx=\"${cx}\" cy=\"${cy}\" r=\"${r}\" fill=\"none\" stroke=\"${s.f.color}\"\n               stroke-width=\"16\"\n               stroke-dasharray=\"${s.len} ${C - s.len}\"\n               stroke-dashoffset=\"${-s.offset}\"\n               transform=\"rotate(-90 ${cx} ${cy})\"\n               style=\"transition: stroke-dasharray 0.4s ease, stroke-dashoffset 0.4s ease;\"/>`);\n  });\n\n  const legend = EXPENSE_FIELDS\n    .map(f => ({ f, v: d.expenses[f.id] || 0 }))\n    .filter(x => x.v > 0)\n    .sort((a,b) => b.v - a.v)\n    .map(x => `\n      <div class=\"legend-row\">\n        <span class=\"legend-dot\" style=\"background:${x.f.color};\"><\u002Fspan>\n        <span class=\"legend-name\">${x.f.label}<\u002Fspan>\n        <span class=\"legend-val\">${fmt(x.v)}<\u002Fspan>\n        <span class=\"legend-pct\">${Math.round(x.v/total*100)}%<\u002Fspan>\n      <\u002Fdiv>\n    `).join('');\n  document.getElementById('legend').innerHTML = legend;\n}\n\n/* =================== BARS =================== */\n\nfunction renderBars(d) {\n  const items = EXPENSE_FIELDS\n    .map(f => ({ f, v: d.expenses[f.id] || 0 }))\n    .sort((a,b) => b.v - a.v);\n  const max = Math.max(...items.map(x => x.v), 1);\n\n  const host = document.getElementById('bars');\n  if (d.expenseTotal <= 0) {\n    host.innerHTML = `<div class=\"empty\">Gib Ausgaben ein, um den Vergleich zu sehen.<\u002Fdiv>`;\n    return;\n  }\n\n  host.innerHTML = items.map(x => {\n    const w = x.v > 0 ? Math.max(2, (x.v / max) * 100) : 0;\n    return `\n      <div class=\"bar-row\">\n        <div class=\"bar-head\">\n          <span class=\"bar-name\"><span class=\"sq\" style=\"background:${x.f.color};\"><\u002Fspan>${x.f.label}<\u002Fspan>\n          <span class=\"bar-val\">${fmt(x.v)}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"bar-track\">\n          <div class=\"bar-fill\" style=\"width:${w}%; background:${x.f.color};\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }).join('');\n}\n\n/* =================== RINGS =================== */\n\nconst RING_C = 2 * Math.PI * 50; // 314.159...\n\nfunction renderRings(fixPct, savePct) {\n  // Fix ring (0-100% but cap visual at 100)\n  const fixV = Math.min(100, Math.max(0, fixPct));\n  const fixEl = document.getElementById('ring-fix');\n  fixEl.setAttribute('stroke-dashoffset', RING_C - (fixV / 100) * RING_C);\n  // color by band\n  if (fixPct < 50) fixEl.setAttribute('stroke', '#1F4FA5');\n  else if (fixPct < 70) fixEl.setAttribute('stroke', '#FF7A1A');\n  else fixEl.setAttribute('stroke', '#C24A12');\n  document.getElementById('ring-fix-val').textContent = pct(fixPct);\n\n  // Save ring\n  const saveV = Math.min(100, Math.max(0, savePct));\n  const saveEl = document.getElementById('ring-save');\n  saveEl.setAttribute('stroke-dashoffset', RING_C - (saveV / 100) * RING_C);\n  if (savePct >= 15) saveEl.setAttribute('stroke', '#2E8B6B');\n  else if (savePct >= 10) saveEl.setAttribute('stroke', '#FF7A1A');\n  else saveEl.setAttribute('stroke', '#C24A12');\n  document.getElementById('ring-save-val').textContent = pct(savePct);\n\n  // Advice texts\n  const fixAdv = document.getElementById('fix-advice');\n  if (fixPct === 0) fixAdv.textContent = 'Gib deine Zahlen ein, um eine Einschätzung zu erhalten.';\n  else if (fixPct < 50) fixAdv.innerHTML = `✓ Deine Fixkosten-Quote liegt im <b>grünen Bereich<\u002Fb>. Du hast Spielraum für Wünsche und Rücklagen.`;\n  else if (fixPct < 70) fixAdv.innerHTML = `⚠ Deine Fixkosten sind <b>grenzwertig hoch<\u002Fb>. Prüfe Verträge und Abos – oft sind 100-200 €/Monat Sparpotenzial drin.`;\n  else fixAdv.innerHTML = `✕ Deine Fixkosten sind <b>kritisch hoch<\u002Fb>. Ohne Veränderung bleibt kaum Raum für Sparen oder Unvorhergesehenes.`;\n\n  const saveAdv = document.getElementById('save-advice');\n  if (savePct === 0) saveAdv.textContent = 'Gib deine Zahlen ein, um deine Sparrate zu sehen.';\n  else if (savePct >= 15) saveAdv.innerHTML = `✓ Stark! Du erreichst das 15%-Ziel und legst aktiv für später zurück.`;\n  else if (savePct >= 10) saveAdv.innerHTML = `≈ Solide – mit <b>${Math.round(15 - savePct)}% mehr<\u002Fb> wärst du am Altersvorsorge-Ziel.`;\n  else saveAdv.innerHTML = `Noch unter dem Richtwert. Selbst kleine, automatische Daueraufträge bringen dich über die Jahre weit nach vorne.`;\n}\n\n/* =================== UPDATE =================== */\n\nfunction update() {\n  const d = readValues();\n  const { savePct, fixPct } = renderTotals(d);\n  renderDonut(d);\n  renderBars(d);\n  renderRings(fixPct, savePct);\n}\n\n/* =================== EVENTS =================== */\n\nfunction setupEvents() {\n  document.querySelectorAll('input.money').forEach(inp => {\n    inp.addEventListener('input', update);\n    inp.addEventListener('change', update);\n  });\n\n  document.getElementById('reset-btn').addEventListener('click', () => {\n    document.querySelectorAll('input.money').forEach(i => i.value = '');\n    update();\n  });\n\n  document.getElementById('example-btn').addEventListener('click', () => {\n    const sample = {\n      'in-salary': 2800, 'in-side': 300, 'in-misc': 0,\n      'ex-housing': 780, 'ex-utilities': 140, 'ex-food': 380,\n      'ex-fuel': 180, 'ex-transit': 60, 'ex-mobile': 45,\n      'ex-insurance': 160, 'ex-loans': 220, 'ex-subs': 35,\n      'ex-gym': 30, 'ex-pets': 60, 'ex-leisure': 160,\n      'ex-savings': 450,\n    };\n    Object.entries(sample).forEach(([k,v]) => {\n      const el = document.getElementById(k);\n      if (el) el.value = v;\n    });\n    update();\n  });\n}\n\n/* =================== INIT =================== */\n\n/* =================== WEALTH =================== */\n\nconst LIQUID_FIELDS = [\n  { id: 'cash',     label: 'Bargeld',             icon: 'wallet',  color: '#5C8FDE' },\n  { id: 'checking', label: 'Girokonto',           icon: 'bank',    color: '#2C6BD1' },\n  { id: 'savings',  label: 'Tagesgeld / Sparkonto', icon: 'piggy',  color: '#1F4FA5' },\n];\nconst INVEST_FIELDS = [\n  { id: 'etf',     label: 'ETFs & Fonds',        icon: 'chart',   color: '#0A1F44' },\n  { id: 'stocks',  label: 'Einzelaktien',        icon: 'trending', color: '#183A7E' },\n  { id: 'crypto',  label: 'Krypto',              icon: 'coin',    color: '#FF7A1A' },\n  { id: 'pension', label: 'Rentenversicherung',  icon: 'shield',  color: '#4A7CCD' },\n];\nconst TANGIBLE_FIELDS = [\n  { id: 'realestate', label: 'Immobilie (Wert)', icon: 'home',  color: '#2C6BD1' },\n  { id: 'vehicle',    label: 'Fahrzeug (Wert)',  icon: 'car',   color: '#5C8FDE' },\n  { id: 'other',      label: 'Sonstige Sachwerte', icon: 'sparkle', color: '#8EB3E8' },\n];\nconst DEBT_FIELDS = [\n  { id: 'mortgage', label: 'Immobilienkredit',   icon: 'home',  color: '#C24A12' },\n  { id: 'consumer', label: 'Konsumkredit / Raten', icon: 'bank', color: '#FF7A1A' },\n  { id: 'other_debt', label: 'Sonstige Schulden', icon: 'plus', color: '#FFB68A' },\n];\n\nconst WEALTH_ICONS = {\n  chart:    '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 3v18h18\"/><rect x=\"7\" y=\"12\" width=\"3\" height=\"6\"/><rect x=\"12\" y=\"8\" width=\"3\" height=\"10\"/><rect x=\"17\" y=\"4\" width=\"3\" height=\"14\"/><\u002Fsvg>',\n  trending: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"3 17 9 11 13 15 21 7\"/><polyline points=\"15 7 21 7 21 13\"/><\u002Fsvg>',\n  coin:     '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"/><path d=\"M12 7v10\"/><path d=\"M9 10h4.5a1.5 1.5 0 0 1 0 3H9h4.5a1.5 1.5 0 0 1 0 3H9\"/><\u002Fsvg>',\n};\n\nfunction buildWealthForm() {\n  const mk = (fields, kind, danger) => fields.map(f => {\n    const icon = (WEALTH_ICONS[f.icon] || ICONS[f.icon] || '');\n    const bg = danger ? '#FFF1E5' : 'var(--brand-100)';\n    return `\n      <div class=\"asset-row\">\n        <label class=\"row-label\" for=\"w-${kind}-${f.id}\">\n          <span class=\"row-icon\" style=\"color:${f.color}; background:${bg};\">${icon}<\u002Fspan>\n          ${f.label}\n        <\u002Flabel>\n        <div class=\"input-wrap\">\n          <input type=\"number\" inputmode=\"decimal\" class=\"money wealth-input\" id=\"w-${kind}-${f.id}\" data-kind=\"${kind}\" data-id=\"${f.id}\" placeholder=\"0\" min=\"0\" step=\"10\"/>\n          <span class=\"eur\">€<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }).join('');\n\n  document.getElementById('liquid-list').innerHTML   = mk(LIQUID_FIELDS, 'liquid');\n  document.getElementById('invest-list').innerHTML   = mk(INVEST_FIELDS, 'invest');\n  document.getElementById('tangible-list').innerHTML = mk(TANGIBLE_FIELDS, 'tangible');\n  document.getElementById('debt-list').innerHTML     = mk(DEBT_FIELDS, 'debt', true);\n}\n\nfunction readWealth() {\n  const sum = (fields, kind) => fields.reduce((s, f) => s + (parseFloat(document.getElementById(`w-${kind}-${f.id}`)?.value) || 0), 0);\n  return {\n    liquid:   sum(LIQUID_FIELDS, 'liquid'),\n    invest:   sum(INVEST_FIELDS, 'invest'),\n    tangible: sum(TANGIBLE_FIELDS, 'tangible'),\n    debt:     sum(DEBT_FIELDS, 'debt'),\n  };\n}\n\nfunction renderWealth() {\n  const w = readWealth();\n  const gross = w.liquid + w.invest + w.tangible;\n  const net = gross - w.debt;\n\n  document.getElementById('w-net').innerHTML = `${fmtShort(net)}<span class=\"unit\">€<\u002Fspan>`;\n  document.getElementById('w-liquid').textContent = fmt(w.liquid);\n  document.getElementById('w-depot').textContent = fmt(w.invest);\n\n  // Allocation bars\n  const categories = [\n    { label: 'Liquide Mittel',    v: w.liquid,   color: '#2C6BD1' },\n    { label: 'Depot & Anlagen',   v: w.invest,   color: '#FF7A1A' },\n    { label: 'Sachwerte',         v: w.tangible, color: '#0A1F44' },\n    { label: 'Verbindlichkeiten', v: -w.debt,    color: '#C24A12' },\n  ];\n  const maxAbs = Math.max(...categories.map(c => Math.abs(c.v)), 1);\n  const host = document.getElementById('alloc-bars');\n  if (gross <= 0 && w.debt <= 0) {\n    host.innerHTML = `<div class=\"empty\">Gib deine Vermögenswerte ein, um die Aufteilung zu sehen.<\u002Fdiv>`;\n  } else {\n    host.innerHTML = categories.map(c => {\n      const val = c.v;\n      const w_ = Math.max(2, (Math.abs(val) / maxAbs) * 100);\n      const share = gross > 0 ? Math.round(Math.abs(val) / gross * 100) : 0;\n      return `\n        <div class=\"alloc-bar-row\">\n          <div class=\"alloc-head\">\n            <span class=\"alloc-name\"><span class=\"sq\" style=\"background:${c.color};\"><\u002Fspan>${c.label}<\u002Fspan>\n            <span class=\"alloc-val\">${val < 0 ? '− ' : ''}${fmt(Math.abs(val))}${val >= 0 ? `<span class=\"pct\">${share}%<\u002Fspan>` : ''}<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"alloc-track\"><div class=\"alloc-fill\" style=\"width:${w_}%; background:${c.color};\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      `;\n    }).join('');\n  }\n\n  // Projection: future value of depot + monthly savings at 6% p.a.\n  const monthlySave = parseFloat(document.getElementById('ex-savings')?.value) || 0;\n  const r = 0.06 / 12;\n  const project = (years) => {\n    const n = years * 12;\n    const fvPresent = w.invest * Math.pow(1 + r, n);\n    const fvStream = monthlySave > 0 ? monthlySave * ((Math.pow(1 + r, n) - 1) / r) : 0;\n    return fvPresent + fvStream;\n  };\n  document.getElementById('proj-5').textContent  = fmt(project(5));\n  document.getElementById('proj-10').textContent = fmt(project(10));\n  document.getElementById('proj-20').textContent = fmt(project(20));\n  document.getElementById('proj-note').innerHTML = monthlySave > 0\n    ? `Depot <b>${fmt(w.invest)}<\u002Fb> + monatliche Sparrate <b>${fmt(monthlySave)}<\u002Fb> aus dem Budgetplan.`\n    : `Nur aktuelles Depot gerechnet. Trage im Budgetplan eine Sparrate ein, um sie einzubeziehen.`;\n}\n\nfunction setupTabs() {\n  document.querySelectorAll('.tab').forEach(btn => {\n    btn.addEventListener('click', () => {\n      const t = btn.dataset.tab;\n      document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn));\n      document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === `view-${t}`));\n      if (t === 'wealth') renderWealth();\n    });\n  });\n}\n\nfunction setupWealthEvents() {\n  document.querySelectorAll('.wealth-input').forEach(inp => {\n    inp.addEventListener('input', renderWealth);\n  });\n  document.getElementById('wealth-example-btn').addEventListener('click', () => {\n    const sample = {\n      'w-liquid-cash': 200, 'w-liquid-checking': 1800, 'w-liquid-savings': 8500,\n      'w-invest-etf': 14500, 'w-invest-stocks': 3200, 'w-invest-crypto': 1100, 'w-invest-pension': 6800,\n      'w-tangible-realestate': 0, 'w-tangible-vehicle': 9500, 'w-tangible-other': 0,\n      'w-debt-mortgage': 0, 'w-debt-consumer': 3200, 'w-debt-other_debt': 0,\n    };\n    Object.entries(sample).forEach(([k,v]) => { const el = document.getElementById(k); if (el) el.value = v; });\n    renderWealth();\n  });\n  document.getElementById('wealth-reset-btn').addEventListener('click', () => {\n    document.querySelectorAll('.wealth-input').forEach(i => i.value = '');\n    renderWealth();\n  });\n}\n\n/* =================== PDF EXPORT =================== */\n\nfunction exportPDF() {\n  const { jsPDF } = window.jspdf;\n  const doc = new jsPDF({ unit: 'pt', format: 'a4' });\n  const W = doc.internal.pageSize.getWidth();   // 595.28\n  const H = doc.internal.pageSize.getHeight();  // 841.89\n\n  // colors\n  const BRAND_900 = [10, 31, 68];\n  const BRAND_600 = [31, 79, 165];\n  const BRAND_500 = [44, 107, 209];\n  const ACCENT    = [255, 122, 26];\n  const INK       = [11, 27, 54];\n  const INK_2     = [58, 74, 102];\n  const INK_3     = [107, 122, 147];\n  const LINE      = [228, 235, 245];\n  const BG_SOFT   = [244, 248, 253];\n  const OK        = [46, 139, 107];\n  const WARN      = [194, 74, 18];\n\n  const d = readValues();\n  const w = readWealth();\n  const result = d.incomeTotal - d.expenseTotal;\n  const savePct = d.incomeTotal > 0 ? (d.saveTotal / d.incomeTotal) * 100 : 0;\n  const fixPct  = d.incomeTotal > 0 ? (d.fixTotal / d.incomeTotal) * 100 : 0;\n  const grossWealth = w.liquid + w.invest + w.tangible;\n  const netWealth = grossWealth - w.debt;\n\n  const fmtPdf = (n) => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(Math.round(n||0));\n\n  const today = new Date();\n  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];\n  const dateStr = `${today.getDate()}. ${months[today.getMonth()]} ${today.getFullYear()}`;\n\n  // === HEADER ===\n  doc.setFillColor(...BRAND_900);\n  doc.rect(0, 0, W, 90, 'F');\n  doc.setFillColor(...ACCENT);\n  doc.rect(0, 90, W, 3, 'F');\n\n  // Logo mark\n  doc.setFillColor(...BRAND_500);\n  doc.roundedRect(40, 30, 32, 32, 6, 6, 'F');\n  doc.setTextColor(255, 255, 255);\n  doc.setFont('helvetica', 'bold');\n  doc.setFontSize(20);\n  doc.text('B', 56, 53, { align: 'center' });\n\n  doc.setFontSize(18);\n  doc.text('Budgetplan', 84, 47);\n  doc.setFont('helvetica', 'normal');\n  doc.setFontSize(9);\n  doc.setTextColor(155, 179, 219);\n  doc.text('EINNAHMEN · AUSGABEN · VERMÖGEN', 84, 60);\n\n  doc.setFontSize(9);\n  doc.text(`Stand: ${dateStr}`, W - 40, 47, { align: 'right' });\n  doc.text('Zeitraum: monatlich · EUR', W - 40, 60, { align: 'right' });\n\n  let y = 120;\n\n  // === TITLE ===\n  doc.setTextColor(...INK);\n  doc.setFont('helvetica', 'bold');\n  doc.setFontSize(22);\n  doc.text('Dein Monatsüberblick', 40, y);\n  y += 18;\n  doc.setFont('helvetica', 'normal');\n  doc.setFontSize(10);\n  doc.setTextColor(...INK_3);\n  const clientName = (document.getElementById('client-name')?.value || '').trim();\n  const clientNotes = (document.getElementById('client-notes')?.value || '').trim();\n  const subtitleLine = clientName ? `Kunde: ${clientName}` : 'Zusammenfassung der Einnahmen, Ausgaben und Kennzahlen.';\n  doc.text(subtitleLine, 40, y);\n  y += 14;\n  if (clientNotes) {\n    doc.setFontSize(9);\n    doc.setTextColor(...INK_3);\n    const notesLines = doc.splitTextToSize(`Notizen: ${clientNotes}`, W - 80);\n    doc.text(notesLines, 40, y);\n    y += notesLines.length * 11 + 4;\n  }\n  y += 10;\n\n  // === KPI ROW ===\n  const kpiW = (W - 80 - 3 * 12) / 4;\n  const kpiH = 76;\n  const kpiData = [\n    { lbl: 'NETTO-EINKOMMEN', val: fmtPdf(d.incomeTotal), sub: `Jahr: ${fmtPdf(d.incomeTotal * 12)}`, color: BRAND_600 },\n    { lbl: 'AUSGABEN',         val: fmtPdf(d.expenseTotal), sub: `davon Fix: ${fmtPdf(d.fixTotal)}`, color: ACCENT },\n    { lbl: 'SPARRATE',         val: `${Math.round(savePct)}%`, sub: `gespart: ${fmtPdf(d.saveTotal)}`, color: savePct >= 15 ? OK : (savePct >= 10 ? ACCENT : WARN) },\n    { lbl: 'FIXKOSTEN-QUOTE',  val: `${Math.round(fixPct)}%`, sub: 'Richtwert < 50%', color: fixPct < 50 ? OK : (fixPct < 70 ? ACCENT : WARN) },\n  ];\n  kpiData.forEach((k, i) => {\n    const x = 40 + i * (kpiW + 12);\n    doc.setFillColor(255, 255, 255);\n    doc.setDrawColor(...LINE);\n    doc.setLineWidth(0.7);\n    doc.roundedRect(x, y, kpiW, kpiH, 6, 6, 'FD');\n    // accent strip\n    doc.setFillColor(...k.color);\n    doc.rect(x, y, 3, kpiH, 'F');\n    // label\n    doc.setFont('helvetica', 'bold');\n    doc.setFontSize(7);\n    doc.setTextColor(...INK_3);\n    doc.text(k.lbl, x + 12, y + 16);\n    // value\n    doc.setFont('helvetica', 'bold');\n    doc.setFontSize(18);\n    doc.setTextColor(...INK);\n    doc.text(k.val, x + 12, y + 42);\n    // sub\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(8);\n    doc.setTextColor(...INK_3);\n    doc.text(k.sub, x + 12, y + 60);\n  });\n  y += kpiH + 24;\n\n  // === INCOME TABLE ===\n  doc.setFont('helvetica', 'bold');\n  doc.setFontSize(11);\n  doc.setTextColor(...BRAND_900);\n  doc.text('EINNAHMEN', 40, y);\n  doc.setDrawColor(...LINE);\n  doc.line(40 + 70, y - 3, W - 40, y - 3);\n  y += 12;\n  INCOME_FIELDS.forEach(f => {\n    const v = d.income[f.id];\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(10);\n    doc.setTextColor(...INK_2);\n    doc.text(f.label, 40, y);\n    doc.setFont('helvetica', 'bold');\n    doc.setTextColor(...INK);\n    doc.text(fmtPdf(v), W - 40, y, { align: 'right' });\n    y += 14;\n    doc.setDrawColor(...LINE);\n    doc.line(40, y - 6, W - 40, y - 6);\n  });\n  doc.setFont('helvetica', 'bold');\n  doc.setFontSize(10);\n  doc.setTextColor(...BRAND_600);\n  doc.text('Einnahmen gesamt', 40, y + 6);\n  doc.text(fmtPdf(d.incomeTotal), W - 40, y + 6, { align: 'right' });\n  y += 24;\n\n  // === EXPENSE TABLE ===\n  doc.setFont('helvetica', 'bold');\n  doc.setFontSize(11);\n  doc.setTextColor(...BRAND_900);\n  doc.text('AUSGABEN', 40, y);\n  doc.setDrawColor(...LINE);\n  doc.line(40 + 70, y - 3, W - 40, y - 3);\n  y += 12;\n  EXPENSE_FIELDS.forEach(f => {\n    const v = d.expenses[f.id];\n    const typeLabel = f.type === 'fix' ? 'Fix' : (f.type === 'save' ? 'Sparen' : 'Variabel');\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(10);\n    doc.setTextColor(...INK_2);\n    doc.text(f.label, 40, y);\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(8);\n    doc.setTextColor(...INK_3);\n    doc.text(typeLabel, 320, y);\n    // share\n    const share = d.expenseTotal > 0 ? Math.round(v / d.expenseTotal * 100) : 0;\n    doc.text(`${share}%`, 400, y);\n    doc.setFont('helvetica', 'bold');\n    doc.setFontSize(10);\n    doc.setTextColor(...INK);\n    doc.text(fmtPdf(v), W - 40, y, { align: 'right' });\n    y += 14;\n    doc.setDrawColor(...LINE);\n    doc.line(40, y - 6, W - 40, y - 6);\n  });\n  doc.setFont('helvetica', 'bold');\n  doc.setFontSize(10);\n  doc.setTextColor(...ACCENT);\n  doc.text('Ausgaben gesamt', 40, y + 6);\n  doc.text(fmtPdf(d.expenseTotal), W - 40, y + 6, { align: 'right' });\n  y += 24;\n\n  // === RESULT BAR ===\n  doc.setFillColor(...BRAND_900);\n  doc.roundedRect(40, y, W - 80, 46, 6, 6, 'F');\n  doc.setFont('helvetica', 'normal');\n  doc.setFontSize(9);\n  doc.setTextColor(155, 179, 219);\n  doc.text('ÜBRIG AM MONATSENDE', 56, y + 18);\n  doc.setFont('helvetica', 'bold');\n  doc.setFontSize(20);\n  doc.setTextColor(...(result >= 0 ? [110, 231, 183] : [255, 182, 138]));\n  doc.text(`${result >= 0 ? '+ ' : '− '}${fmtPdf(Math.abs(result))}`, W - 56, y + 31, { align: 'right' });\n  y += 62;\n\n  // === PAGE 2: WEALTH ===\n  doc.addPage();\n  // header (compact)\n  doc.setFillColor(...BRAND_900);\n  doc.rect(0, 0, W, 60, 'F');\n  doc.setFillColor(...ACCENT);\n  doc.rect(0, 60, W, 2, 'F');\n  doc.setTextColor(255, 255, 255);\n  doc.setFont('helvetica', 'bold');\n  doc.setFontSize(14);\n  doc.text('Vermögensübersicht', 40, 38);\n  doc.setFont('helvetica', 'normal');\n  doc.setFontSize(9);\n  doc.setTextColor(155, 179, 219);\n  doc.text(`Stand: ${dateStr}`, W - 40, 38, { align: 'right' });\n\n  y = 92;\n\n  // Net wealth summary\n  doc.setFillColor(...BRAND_900);\n  doc.roundedRect(40, y, W - 80, 72, 6, 6, 'F');\n  doc.setFont('helvetica', 'bold');\n  doc.setFontSize(8);\n  doc.setTextColor(155, 179, 219);\n  doc.text('NETTO-VERMÖGEN', 56, y + 20);\n  doc.text('LIQUIDE MITTEL', 240, y + 20);\n  doc.text('DEPOT-WERT', 400, y + 20);\n  doc.setFont('helvetica', 'bold');\n  doc.setFontSize(22);\n  doc.setTextColor(255, 255, 255);\n  doc.text(fmtPdf(netWealth), 56, y + 50);\n  doc.setFontSize(16);\n  doc.text(fmtPdf(w.liquid), 240, y + 48);\n  doc.text(fmtPdf(w.invest), 400, y + 48);\n  y += 90;\n\n  // Wealth sections\n  const sections = [\n    { title: 'LIQUIDE MITTEL', fields: LIQUID_FIELDS, kind: 'liquid' },\n    { title: 'DEPOT & ANLAGEN', fields: INVEST_FIELDS, kind: 'invest' },\n    { title: 'SACHWERTE', fields: TANGIBLE_FIELDS, kind: 'tangible' },\n    { title: 'VERBINDLICHKEITEN', fields: DEBT_FIELDS, kind: 'debt' },\n  ];\n  sections.forEach(s => {\n    doc.setFont('helvetica', 'bold');\n    doc.setFontSize(10);\n    doc.setTextColor(...BRAND_900);\n    doc.text(s.title, 40, y);\n    doc.setDrawColor(...LINE);\n    doc.line(40 + 110, y - 3, W - 40, y - 3);\n    y += 12;\n    s.fields.forEach(f => {\n      const el = document.getElementById(`w-${s.kind}-${f.id}`);\n      const v = el ? (parseFloat(el.value) || 0) : 0;\n      doc.setFont('helvetica', 'normal');\n      doc.setFontSize(10);\n      doc.setTextColor(...INK_2);\n      doc.text(f.label, 40, y);\n      doc.setFont('helvetica', 'bold');\n      doc.setTextColor(...(s.kind === 'debt' ? WARN : INK));\n      doc.text((s.kind === 'debt' && v > 0 ? '− ' : '') + fmtPdf(v), W - 40, y, { align: 'right' });\n      y += 14;\n      doc.setDrawColor(...LINE);\n      doc.line(40, y - 6, W - 40, y - 6);\n    });\n    y += 10;\n  });\n\n  // === FOOTER on each page ===\n  const pageCount = doc.internal.getNumberOfPages();\n  for (let p = 1; p <= pageCount; p++) {\n    doc.setPage(p);\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(8);\n    doc.setTextColor(...INK_3);\n    doc.text('Budgetplan · Persönlicher Finanzüberblick', 40, H - 24);\n    doc.text(`Seite ${p} / ${pageCount}`, W - 40, H - 24, { align: 'right' });\n  }\n\n  // Use client name in filename if provided\n  const nameSlug = clientName ? '_' + clientName.replace(/[^a-zA-Z0-9äöüÄÖÜß]+/g, '-').replace(/^-|-$/g, '') : '';\n  const fname = `Budgetplan${nameSlug}_${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}.pdf`;\n  doc.save(fname);\n}\n\n\nfunction init() {\n  const today = new Date();\n  const months = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];\n  document.getElementById('today').textContent = `${today.getDate()}. ${months[today.getMonth()]} ${today.getFullYear()}`;\n\n  buildForm();\n  setupEvents();\n  update();\n\n  buildWealthForm();\n  setupWealthEvents();\n  setupTabs();\n  renderWealth();\n\n  document.getElementById('pdf-btn').addEventListener('click', exportPDF);\n}\n\ninit();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
